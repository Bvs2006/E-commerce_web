<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>User Profile - Emporium</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" href="../css/main.css">
	<style>
		.profile-container {
			max-width: 1000px;
			margin: 0 auto;
			padding: 40px 20px;
		}

		.profile-header {
			display: grid;
			grid-template-columns: auto 1fr;
			gap: 30px;
			padding: 30px;
			background: white;
			border-radius: 8px;
			margin-bottom: 30px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			align-items: start;
		}

		.profile-avatar {
			width: 150px;
			height: 150px;
			border-radius: 50%;
			background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
			display: flex;
			align-items: center;
			justify-content: center;
			color: white;
			font-size: 60px;
			position: relative;
		}

		.profile-avatar-upload {
			position: absolute;
			bottom: 10px;
			right: 10px;
			background-color: var(--primary-color);
			width: 40px;
			height: 40px;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			color: white;
			border: 3px solid white;
		}

		.profile-info h2 {
			margin-bottom: 10px;
		}

		.profile-info p {
			margin: 5px 0;
			color: var(--text-color);
		}

		.profile-tabs {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
			gap: 15px;
			margin-top: 20px;
		}

		.profile-tabs .btn {
			padding: 10px 15px;
			background-color: var(--light-color);
			color: var(--dark-color);
			border: none;
			cursor: pointer;
		}

		.profile-tabs .btn.active {
			background-color: var(--primary-color);
			color: white;
		}

		.tab-content {
			background: white;
			border-radius: 8px;
			padding: 30px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			display: none;
		}

		.tab-content.active {
			display: block;
		}

		.form-group {
			margin-bottom: 20px;
		}

		.form-group label {
			display: block;
			margin-bottom: 8px;
			font-weight: 600;
			color: var(--dark-color);
		}

		.form-group input,
		.form-group textarea {
			width: 100%;
			padding: 12px;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			font-family: 'Spartan', sans-serif;
			font-size: 14px;
		}

		.form-group input:focus,
		.form-group textarea:focus {
			outline: none;
			border-color: var(--primary-color);
			box-shadow: 0 0 0 3px rgba(8, 129, 120, 0.1);
		}

		.form-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
		}

		.address-card {
			border: 2px solid var(--border-color);
			border-radius: 8px;
			padding: 20px;
			margin-bottom: 15px;
			position: relative;
		}

		.address-card.default {
			border-color: var(--primary-color);
			background-color: rgba(8, 129, 120, 0.05);
		}

		.address-badge {
			position: absolute;
			top: 10px;
			right: 10px;
			background-color: var(--primary-color);
			color: white;
			padding: 3px 8px;
			border-radius: 4px;
			font-size: 11px;
			font-weight: 700;
		}

		.address-card h5 {
			margin-top: 0;
			margin-bottom: 8px;
		}

		.address-card p {
			margin: 3px 0;
			font-size: 13px;
			color: var(--text-color);
		}

		.address-actions {
			display: flex;
			gap: 10px;
			margin-top: 10px;
		}

		.address-actions button {
			padding: 6px 12px;
			background-color: var(--light-color);
			border: none;
			border-radius: 4px;
			cursor: pointer;
			font-size: 12px;
			transition: 0.3s ease;
		}

		.address-actions button:hover {
			background-color: var(--primary-color);
			color: white;
		}

		.order-card {
			border: 1px solid var(--border-color);
			border-radius: 8px;
			padding: 20px;
			margin-bottom: 20px;
		}

		.order-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 15px;
			padding-bottom: 15px;
			border-bottom: 1px solid var(--border-color);
		}

		.order-id {
			font-weight: 700;
			color: var(--dark-color);
		}

		.order-status {
			padding: 5px 12px;
			border-radius: 4px;
			font-size: 12px;
			font-weight: 700;
		}

		.order-status.pending {
			background-color: #fff3cd;
			color: #856404;
		}

		.order-status.shipped {
			background-color: #cfe2ff;
			color: #084298;
		}

		.order-status.delivered {
			background-color: #d1e7dd;
			color: #0f5132;
		}

		.order-items {
			margin-bottom: 15px;
		}

		.order-item {
			display: flex;
			gap: 15px;
			padding-bottom: 10px;
			border-bottom: 1px solid var(--border-color);
		}

		.order-item:last-child {
			border-bottom: none;
		}

		.order-item-image {
			width: 60px;
			height: 60px;
			border-radius: 4px;
			overflow: hidden;
		}

		.order-item-image img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		.order-item-info {
			flex-grow: 1;
		}

		.order-item-info h5 {
			margin: 0 0 5px 0;
		}

		.order-item-info p {
			margin: 0;
			font-size: 13px;
			color: var(--text-color);
		}

		.order-actions {
			display: flex;
			gap: 10px;
		}

		.order-actions .btn {
			padding: 8px 15px;
			font-size: 12px;
		}

		.stats-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
			gap: 20px;
			margin-bottom: 30px;
		}

		.stat-card {
			background: linear-gradient(135deg, var(--primary-color), #066c5e);
			color: white;
			padding: 20px;
			border-radius: 8px;
			text-align: center;
		}

		.stat-value {
			font-size: 28px;
			font-weight: 700;
			margin-bottom: 5px;
		}

		.stat-label {
			font-size: 13px;
			opacity: 0.9;
		}

		.message-thread {
			border: 1px solid var(--border-color);
			border-radius: 8px;
			padding: 15px;
			margin-bottom: 20px;
			background: white;
		}

		.message-thread-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding-bottom: 10px;
			border-bottom: 1px solid var(--border-color);
			margin-bottom: 10px;
		}

		.message-seller {
			font-weight: 700;
			color: var(--dark-color);
		}

		.message-time {
			font-size: 12px;
			color: var(--text-color);
		}

		.message-preview {
			font-size: 13px;
			color: var(--text-color);
			margin-bottom: 10px;
			display: -webkit-box;
			-webkit-line-clamp: 2;
			-webkit-box-orient: vertical;
			overflow: hidden;
		}

		.message-actions {
			display: flex;
			gap: 10px;
		}

		.message-actions .btn {
			padding: 6px 12px;
			font-size: 12px;
			flex: 1;
		}

		@media (max-width: 768px) {
			.profile-header {
				grid-template-columns: 1fr;
				text-align: center;
			}

			.profile-avatar {
				width: 120px;
				height: 120px;
				margin: 0 auto;
			}

			.form-row {
				grid-template-columns: 1fr;
			}

			.profile-tabs {
				grid-template-columns: repeat(2, 1fr);
			}

			.order-header {
				flex-direction: column;
				gap: 10px;
				align-items: start;
			}
		}
	</style>
</head>

<body>
	<!-- Header -->
	<header id="header" style="background-color: var(--light-color);">
		<a href='../index.html'><img src="../img/logo.png" class="logo" alt="logo"></a>
		<div class="brand">
			<h2>Emporium</h2>
		</div>
		<div class="header-icons">
			<a href="../index.html"><i class="fas fa-home"></i></a>
		</div>
	</header>

	<div class="profile-container">
		<!-- Profile Header -->
		<div class="profile-header" id="profileHeader">
			<!-- Will be loaded by JavaScript -->
		</div>

		<!-- Tab Navigation -->
		<div class="profile-tabs">
			<button class="btn active" onclick="switchTab('overview')">Overview</button>
			<button class="btn" onclick="switchTab('orders')">Orders</button>
			<button class="btn" onclick="switchTab('messages')">Messages</button>
			<button class="btn" onclick="switchTab('addresses')">Addresses</button>
			<button class="btn" onclick="switchTab('settings')">Settings</button>
		</div>

		<!-- Overview Tab -->
		<div id="overview" class="tab-content active">
			<h3>Your Stats</h3>
			<div class="stats-grid" id="statsGrid"></div>
			<h3 style="margin-top: 30px;">Recent Orders</h3>
			<div id="recentOrders"></div>
		</div>

		<!-- Orders Tab -->
		<div id="orders" class="tab-content">
			<h3>My Orders</h3>
			<div id="allOrders"></div>
		</div>

		<!-- Messages Tab -->
		<div id="messages" class="tab-content">
			<h3>Messages with Sellers</h3>
			<div id="messagesList"></div>
		</div>

		<!-- Addresses Tab -->
		<div id="addresses" class="tab-content">
			<h3>Saved Addresses</h3>
			<div id="addressesList"></div>
			<button class="btn" style="margin-top: 20px;" onclick="openModal('addAddressModal')">+ Add New
				Address</button>
		</div>

		<!-- Settings Tab -->
		<div id="settings" class="tab-content">
			<h3>Account Settings</h3>
			<form id="settingsForm" style="max-width: 500px;">
				<div class="form-group">
					<label for="firstName">First Name</label>
					<input type="text" id="firstName" name="firstName" required>
				</div>
				<div class="form-group">
					<label for="lastName">Last Name</label>
					<input type="text" id="lastName" name="lastName" required>
				</div>
				<div class="form-group">
					<label for="email">Email Address</label>
					<input type="email" id="email" name="email" required>
				</div>
				<div class="form-group">
					<label for="phone">Phone Number</label>
					<input type="text" id="phone" name="phone" required>
				</div>
				<h4 style="margin-top: 30px;">Change Password</h4>
				<div class="form-group">
					<label for="currentPassword">Current Password</label>
					<input type="password" id="currentPassword" name="currentPassword"
						placeholder="Leave empty to skip">
				</div>
				<div class="form-group">
					<label for="newPassword">New Password</label>
					<input type="password" id="newPassword" name="newPassword" placeholder="Leave empty to skip">
				</div>
				<div class="form-group">
					<label for="confirmPassword">Confirm Password</label>
					<input type="password" id="confirmPassword" name="confirmPassword"
						placeholder="Leave empty to skip">
				</div>
				<button type="submit" class="btn">Save Changes</button>
				<button type="button" class="btn btn-danger" style="margin-left: 10px;"
					onclick="logout()">Logout</button>
			</form>
		</div>
	</div>

	<!-- Add Address Modal -->
	<div id="addAddressModal" class="modal">
		<div class="modal-content" style="max-width: 500px;">
			<div class="modal-header">
				<h2>Add New Address</h2>
				<button class="close-btn" onclick="closeModal('addAddressModal')">&times;</button>
			</div>
			<form id="addressForm">
				<div class="form-group">
					<label for="addressType">Address Type</label>
					<select id="addressType" required>
						<option value="Home">Home</option>
						<option value="Office">Office</option>
						<option value="Other">Other</option>
					</select>
				</div>
				<div class="form-group">
					<label for="fullName">Full Name</label>
					<input type="text" id="fullName" required>
				</div>
				<div class="form-group">
					<label for="phone">Phone Number</label>
					<input type="text" id="phone" required>
				</div>
				<div class="form-group">
					<label for="street">Street Address</label>
					<input type="text" id="street" required>
				</div>
				<div class="form-row">
					<div class="form-group">
						<label for="city">City</label>
						<input type="text" id="city" required>
					</div>
					<div class="form-group">
						<label for="state">State</label>
						<input type="text" id="state" required>
					</div>
				</div>
				<div class="form-row">
					<div class="form-group">
						<label for="zipCode">Zip Code</label>
						<input type="text" id="zipCode" required>
					</div>
					<div class="form-group">
						<label for="country">Country</label>
						<input type="text" id="country" required>
					</div>
				</div>
				<button type="submit" class="btn btn-block">Save Address</button>
			</form>
		</div>
	</div>

	<footer id="footer" style="margin-top: 40px;">
		<div class="footer-bottom">
			<p>&copy; 2024 Emporium. All rights reserved.</p>
		</div>
	</footer>

	<script src="../js/main.js"></script>
	<script>
		let currentUser = null;
		let userAddresses = JSON.parse(localStorage.getItem('userAddresses')) || [];
		let userOrders = JSON.parse(localStorage.getItem('userOrders')) || generateMockOrders();

		document.addEventListener('DOMContentLoaded', function () {
			currentUser = storageManager.getUser();
			if (!currentUser) {
				window.location.href = 'auth/login.html';
				return;
			}

			loadProfileHeader();
			loadStats();
			loadOrders();
			loadMessages();
			loadAddresses();
			loadSettings();
		});

		function loadProfileHeader() {
			const avatar = currentUser.firstName ? currentUser.firstName.charAt(0).toUpperCase() : 'U';
			const name = currentUser.firstName ? `${currentUser.firstName} ${currentUser.lastName || ''}` : currentUser.name || 'User';

			document.getElementById('profileHeader').innerHTML = `
				<div class="profile-avatar">
					${avatar}
					<div class="profile-avatar-upload" title="Change Avatar">
						<i class="fas fa-camera"></i>
					</div>
				</div>
				<div class="profile-info">
					<h2>${name}</h2>
					<p><strong>Email:</strong> ${currentUser.email}</p>
					<p><strong>Member Since:</strong> Jan 2024</p>
					<p><strong>Phone:</strong> ${currentUser.phone || 'Not set'}</p>
					<div style="margin-top: 20px;">
						<span style="display: inline-block; padding: 8px 12px; background-color: var(--success-color); color: white; border-radius: 4px; font-size: 12px; font-weight: 700;">
							<i class="fas fa-check-circle"></i> Verified User
						</span>
					</div>
				</div>
			`;
		}

		function loadStats() {
			const stats = [
				{ label: 'Total Orders', value: userOrders.length, icon: '📦' },
				{ label: 'Completed Orders', value: userOrders.filter(o => o.status === 'delivered').length, icon: '✅' },
				{ label: 'Wishlist Items', value: storageManager.getWishlist().length, icon: '❤️' }
			];

			document.getElementById('statsGrid').innerHTML = stats.map(stat => `
				<div class="stat-card">
					<div class="stat-value">${stat.value}</div>
					<div class="stat-label">${stat.label}</div>
				</div>
			`).join('');
		}

		function loadOrders() {
			const allOrdersDiv = document.getElementById('allOrders');
			const recentDiv = document.getElementById('recentOrders');

			if (userOrders.length === 0) {
				allOrdersDiv.innerHTML = '<p>No orders yet. Start shopping now!</p>';
				recentDiv.innerHTML = '<p>No recent orders</p>';
				return;
			}

			const orderHTML = userOrders.map(order => `
				<div class="order-card">
					<div class="order-header">
						<div class="order-id">Order #${order.id}</div>
						<div>
							<span class="order-status ${order.status}">${order.status.toUpperCase()}</span>
							<span style="margin-left: 15px; color: var(--text-color); font-size: 13px;">${order.date}</span>
						</div>
					</div>
					<div class="order-items">
						${order.items.map(item => `
							<div class="order-item">
								<div class="order-item-image">
									<img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/60'">
								</div>
								<div class="order-item-info">
									<h5>${item.name}</h5>
									<p>Qty: ${item.quantity} × ₹${item.price.toFixed(2)}</p>
								</div>
								<div style="font-weight: 700;">₹${(item.quantity * item.price).toFixed(2)}</div>
							</div>
						`).join('')}
					</div>
					<div style="text-align: right; padding-top: 10px; border-top: 1px solid var(--border-color); margin-top: 10px;">
						<strong>Total: ₹${order.total.toFixed(2)}</strong>
					</div>
					<div class="order-actions" style="margin-top: 15px;">
						<button class="btn btn-small">Track Order</button>
						<button class="btn btn-small btn-secondary">Leave Review</button>
						${order.status === 'delivered' ? '<button class="btn btn-small btn-danger">Return Item</button>' : ''}
					</div>
				</div>
			`).join('');

			allOrdersDiv.innerHTML = orderHTML;
			recentDiv.innerHTML = userOrders.slice(0, 2).map(order => `
				<div class="order-card">
					<div class="order-header">
						<div class="order-id">Order #${order.id}</div>
						<span class="order-status ${order.status}">${order.status.toUpperCase()}</span>
					</div>
					<p style="margin: 10px 0; font-size: 13px; color: var(--text-color);">${order.date} - ₹${order.total.toFixed(2)}</p>
				</div>
			`).join('');
		}

		function loadMessages() {
			const messages = [
				{ seller: 'Beauty Store', message: 'Hi! Does this come in other colors?', date: '2 hours ago', unread: 1 },
				{ seller: 'Tech Hub', message: 'Thanks for your purchase! Your order...', date: '1 day ago', unread: 0 }
			];

			document.getElementById('messagesList').innerHTML = messages.map(msg => `
				<div class="message-thread">
					<div class="message-thread-header">
						<div class="message-seller">${msg.seller} ${msg.unread > 0 ? `<span style="font-size: 11px; margin-left: 10px; background-color: var(--danger-color); color: white; padding: 2px 6px; border-radius: 3px;">${msg.unread}</span>` : ''}</div>
						<div class="message-time">${msg.date}</div>
					</div>
					<div class="message-preview">${msg.message}</div>
					<div class="message-actions">
						<button class="btn btn-small">Reply</button>
						<button class="btn btn-small" style="background-color: var(--light-color); color: var(--dark-color);">Delete</button>
					</div>
				</div>
			`).join('');
		}

		function loadAddresses() {
			const addressDiv = document.getElementById('addressesList');

			if (userAddresses.length === 0) {
				addressDiv.innerHTML = '<p style="text-align: center; color: var(--text-color);">No addresses saved yet</p>';
				return;
			}

			addressDiv.innerHTML = userAddresses.map((addr, index) => `
				<div class="address-card ${addr.isDefault ? 'default' : ''}">
					${addr.isDefault ? '<div class="address-badge">DEFAULT</div>' : ''}
					<h5>${addr.type}</h5>
					<p><strong>${addr.fullName}</strong></p>
					<p>${addr.street}</p>
					<p>${addr.city}, ${addr.state} ${addr.zipCode}</p>
					<p>${addr.country}</p>
					<p style="margin-top: 8px; font-size: 12px; color: var(--text-color);">Phone: ${addr.phone}</p>
					<div class="address-actions">
						<button type="button" onclick="editAddress(${index})">Edit</button>
						<button type="button" onclick="setDefaultAddress(${index})">Set Default</button>
						<button type="button" onclick="deleteAddress(${index})" style="background-color: var(--danger-color); color: white;">Delete</button>
					</div>
				</div>
			`).join('');
		}

		function loadSettings() {
			document.getElementById('firstName').value = currentUser.firstName || '';
			document.getElementById('lastName').value = currentUser.lastName || '';
			document.getElementById('email').value = currentUser.email;
			document.getElementById('phone').value = currentUser.phone || '';

			document.getElementById('settingsForm').addEventListener('submit', function (e) {
				e.preventDefault();

				currentUser.firstName = document.getElementById('firstName').value;
				currentUser.lastName = document.getElementById('lastName').value;
				currentUser.phone = document.getElementById('phone').value;

				storageManager.setUser(currentUser);
				showToast('Settings saved successfully!', 'success');
			});
		}

		function switchTab(tabName) {
			document.querySelectorAll('.tab-content').forEach(tab => {
				tab.classList.remove('active');
			});
			document.querySelectorAll('.profile-tabs .btn').forEach(btn => {
				btn.classList.remove('active');
			});

			document.getElementById(tabName).classList.add('active');
			event.target.classList.add('active');
		}

		function setDefaultAddress(index) {
			userAddresses.forEach((addr, i) => {
				addr.isDefault = i === index;
			});
			localStorage.setItem('userAddresses', JSON.stringify(userAddresses));
			loadAddresses();
			showToast('Default address updated', 'success');
		}

		function deleteAddress(index) {
			if (confirm('Are you sure you want to delete this address?')) {
				userAddresses.splice(index, 1);
				localStorage.setItem('userAddresses', JSON.stringify(userAddresses));
				loadAddresses();
				showToast('Address deleted', 'info');
			}
		}

		document.getElementById('addressForm').addEventListener('submit', function (e) {
			e.preventDefault();

			const newAddress = {
				type: document.getElementById('addressType').value,
				fullName: document.getElementById('fullName').value,
				phone: document.getElementById('phone').value,
				street: document.getElementById('street').value,
				city: document.getElementById('city').value,
				state: document.getElementById('state').value,
				zipCode: document.getElementById('zipCode').value,
				country: document.getElementById('country').value,
				isDefault: userAddresses.length === 0
			};

			userAddresses.push(newAddress);
			localStorage.setItem('userAddresses', JSON.stringify(userAddresses));
			closeModal('addAddressModal');
			loadAddresses();
			showToast('Address added successfully', 'success');
			this.reset();
		});
