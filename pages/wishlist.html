<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Wishlist - Emporium</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" href="../css/main.css">
	<style>
		.wishlist-container {
			max-width: 1200px;
			margin: 40px auto;
			padding: 0 20px;
		}

		.wishlist-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
			gap: 20px;
			margin-bottom: 40px;
		}

		.wishlist-card {
			background: white;
			border-radius: 8px;
			overflow: hidden;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			transition: all 0.3s ease;
			position: relative;
		}

		.wishlist-card:hover {
			box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
			transform: translateY(-5px);
		}

		.wishlist-card-image {
			width: 100%;
			height: 200px;
			object-fit: cover;
			position: relative;
		}

		.wishlist-badge {
			position: absolute;
			top: 10px;
			right: 10px;
			background-color: var(--danger-color);
			color: white;
			border-radius: 50%;
			width: 40px;
			height: 40px;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			font-size: 18px;
			transition: 0.3s ease;
		}

		.wishlist-badge:hover {
			background-color: #c0392b;
			transform: scale(1.1);
		}

		.wishlist-card-info {
			padding: 15px;
		}

		.wishlist-card-info h4 {
			margin: 0 0 8px 0;
			font-size: 14px;
			color: var(--dark-color);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.wishlist-card-info p {
			margin: 0 0 8px 0;
			font-size: 12px;
			color: var(--text-color);
		}

		.wishlist-price {
			font-size: 16px;
			font-weight: 700;
			color: var(--primary-color);
			margin-bottom: 10px;
		}

		.wishlist-price .old-price {
			text-decoration: line-through;
			color: var(--text-color);
			font-size: 12px;
			margin-left: 8px;
		}

		.wishlist-actions {
			display: flex;
			gap: 8px;
		}

		.wishlist-actions button {
			flex: 1;
			padding: 8px;
			border: none;
			border-radius: 4px;
			font-size: 12px;
			font-weight: 600;
			cursor: pointer;
			transition: 0.3s ease;
		}

		.add-to-cart-btn {
			background-color: var(--primary-color);
			color: white;
		}

		.add-to-cart-btn:hover {
			background-color: #067066;
		}

		.view-details-btn {
			background-color: var(--light-color);
			color: var(--dark-color);
			border: 1px solid var(--border-color);
		}

		.view-details-btn:hover {
			background-color: #e8e8e8;
		}

		.empty-wishlist {
			text-align: center;
			padding: 80px 20px;
		}

		.empty-wishlist i {
			font-size: 80px;
			color: var(--border-color);
			margin-bottom: 20px;
		}

		.empty-wishlist h3 {
			margin: 0 0 10px 0;
			color: var(--dark-color);
			font-size: 24px;
		}

		.empty-wishlist p {
			color: var(--text-color);
			margin-bottom: 20px;
		}

		.filter-section {
			background: white;
			padding: 20px;
			border-radius: 8px;
			margin-bottom: 30px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			display: flex;
			gap: 15px;
			flex-wrap: wrap;
		}

		.filter-section label {
			display: flex;
			align-items: center;
			gap: 8px;
			cursor: pointer;
			font-size: 14px;
		}

		.filter-section input[type="checkbox"] {
			cursor: pointer;
		}

		@media (max-width: 768px) {
			.wishlist-grid {
				grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
				gap: 15px;
			}

			.empty-wishlist {
				padding: 60px 20px;
			}

			.empty-wishlist i {
				font-size: 60px;
			}

			.filter-section {
				flex-direction: column;
			}
		}
	</style>
</head>

<body>
	<!-- Header -->
	<header id="header">
		<a href="../index.html"><img src="../img/logo.png" class="logo" alt="logo"></a>
		<div class="brand">
			<h2>Emporium</h2>
		</div>
		<h1>My Wishlist</h1>
		<a href="cart.html"><i class="far fa-shopping-bag"></i><span class="badge" id="cartBadge">0</span></a>
		<a href="wishlist.html" class="active"><i class="fas fa-heart"></i><span class="badge"
				id="wishlistBadge">0</span></a>
		<div class="user-menu">
			<button onclick="toggleUserMenu()" title="Account">
				<i class="fas fa-user-circle"></i>
			</button>
			<div class="user-dropdown" id="userDropdown">
				<a href="user-profile.html"><i class="fas fa-user"></i> Profile</a>
				<a href="orders.html"><i class="fas fa-box"></i> Orders</a>
				<a href="messages.html"><i class="fas fa-envelope"></i> Messages</a>
				<div id="sellerLinkContainer"></div>
				<hr>
				<a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
			</div>
		</div>
		</div>
	</header>

	<main>
		<div class="wishlist-container">
			<div class="filter-section">
				<label>
					<input type="checkbox" id="filterAvailableOnly" onchange="filterWishlist()">
					<span>Available Only</span>
				</label>
				<label>
					<input type="checkbox" id="filterOnSaleOnly" onchange="filterWishlist()">
					<span>On Sale Only</span>
				</label>
			</div>

			<div id="wishlistContainer"></div>
		</div>
	</main>

	<footer id="footer"></footer>

	<script src="../js/main.js"></script>
	<script>
		document.addEventListener('DOMContentLoaded', function () {
			loadWishlist();
		});

		function loadWishlist() {
			const wishlist = storageManager.getWishlist();
			const container = document.getElementById('wishlistContainer');

			if (wishlist.length === 0) {
				container.innerHTML = `
					<div class="empty-wishlist">
						<i class="fas fa-heart"></i>
						<h3>Your wishlist is empty</h3>
						<p>Save your favorite products to your wishlist!</p>
						<a href="../index.html" class="btn btn-primary" style="display: inline-block;">Continue Shopping</a>
					</div>
				`;
				return;
			}

			let html = '<div class="wishlist-grid">';

			wishlist.forEach(product => {
				const isOnSale = product.discountPrice && product.discountPrice < product.price;
				const hasStock = product.stock > 0;

				html += `
					<div class="wishlist-card">
						<div style="position: relative;">
							<img src="${product.image}" alt="${product.name}" class="wishlist-card-image">
							<div class="wishlist-badge" onclick="removeFromWishlist(${product.id})" title="Remove from wishlist">
								<i class="fas fa-heart"></i>
							</div>
							${isOnSale ? '<span style="position: absolute; top: 50px; right: 10px; background: var(--danger-color); color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;">SALE</span>' : ''}
							${!hasStock ? '<span style="position: absolute; bottom: 10px; left: 10px; background: var(--text-color); color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;">Out of Stock</span>' : ''}
						</div>
						<div class="wishlist-card-info">
							<h4>${product.name}</h4>
							<p><strong>${product.seller || 'Verified Seller'}</strong></p>
							<div class="wishlist-price">
								₹${(product.discountPrice || product.price).toFixed(2)}
								${product.discountPrice ? `<span class="old-price">₹${product.price.toFixed(2)}</span>` : ''}
							</div>
							<div style="margin-bottom: 10px; font-size: 12px;">
								<span>⭐ ${product.rating || 0}/5</span>
								<span style="color: var(--text-color);">(${product.reviews || 0} reviews)</span>
							</div>
							<div class="wishlist-actions">
								<button class="add-to-cart-btn" ${!hasStock ? 'disabled' : ''} onclick="addToCart(${product.id})">
									Add to Cart
								</button>
								<button class="view-details-btn" onclick="window.location.href='product-detail.html?id=${product.id}'">
									View
								</button>
							</div>
						</div>
					</div>
				`;
			});

			html += '</div>';
			container.innerHTML = html;
		}

		function filterWishlist() {
			const wishlist = storageManager.getWishlist();
			const availableOnly = document.getElementById('filterAvailableOnly').checked;
			const onSaleOnly = document.getElementById('filterOnSaleOnly').checked;
			const container = document.getElementById('wishlistContainer');

			let filtered = wishlist.filter(product => {
				if (availableOnly && product.stock === 0) return false;
				if (onSaleOnly && (!product.discountPrice || product.discountPrice >= product.price)) return false;
				return true;
			});

			if (filtered.length === 0) {
				container.innerHTML = `
					<div class="empty-wishlist">
						<i class="fas fa-search"></i>
						<h3>No products found</h3>
						<p>Try adjusting your filters</p>
					</div>
				`;
				return;
			}

			let html = '<div class="wishlist-grid">';

			filtered.forEach(product => {
				const isOnSale = product.discountPrice && product.discountPrice < product.price;
				const hasStock = product.stock > 0;

				html += `
					<div class="wishlist-card">
						<div style="position: relative;">
							<img src="${product.image}" alt="${product.name}" class="wishlist-card-image">
							<div class="wishlist-badge" onclick="removeFromWishlist(${product.id})">
								<i class="fas fa-heart"></i>
							</div>
							${isOnSale ? '<span style="position: absolute; top: 50px; right: 10px; background: var(--danger-color); color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;">SALE</span>' : ''}
							${!hasStock ? '<span style="position: absolute; bottom: 10px; left: 10px; background: var(--text-color); color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;">Out of Stock</span>' : ''}
						</div>
						<div class="wishlist-card-info">
							<h4>${product.name}</h4>
							<p><strong>${product.seller || 'Verified Seller'}</strong></p>
							<div class="wishlist-price">
								₹${(product.discountPrice || product.price).toFixed(2)}
								${product.discountPrice ? `<span class="old-price">₹${product.price.toFixed(2)}</span>` : ''}
							</div>
							<div style="margin-bottom: 10px; font-size: 12px;">
								<span>⭐ ${product.rating || 0}/5</span>
								<span style="color: var(--text-color);">(${product.reviews || 0} reviews)</span>
							</div>
							<div class="wishlist-actions">
								<button class="add-to-cart-btn" ${!hasStock ? 'disabled' : ''} onclick="addToCart(${product.id})">
									Add to Cart
								</button>
								<button class="view-details-btn" onclick="window.location.href='product-detail.html?id=${product.id}'">
									View
								</button>
							</div>
						</div>
					</div>
				`;
			});

			html += '</div>';
			container.innerHTML = html;
		}

		function removeFromWishlist(productId) {
			let wishlist = storageManager.getWishlist();
			wishlist = wishlist.filter(p => p.id !== productId);
			storageManager.setWishlist(wishlist);
			updateWishlistBadge();
			showToast('Removed from wishlist', 'info');
			loadWishlist();
		}

		function addToCart(productId) {
			const allProducts = getAllProducts();
			const product = allProducts.find(p => p.id === productId);
			if (!product) return;

			let cart = storageManager.getCart();
			const existingItem = cart.find(item => item.id === productId);

			if (existingItem) {
				existingItem.quantity += 1;
			} else {
				cart.push({ ...product, quantity: 1 });
			}

			storageManager.setCart(cart);
			updateCartBadge();
			showToast(`${product.name} added to cart!`, 'success');
		}
	</script>
</body>

</html>
