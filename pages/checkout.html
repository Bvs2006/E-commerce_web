<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Checkout - Emporium</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" href="../css/main.css">
	<style>
		.checkout-container {
			display: grid;
			grid-template-columns: 1fr 350px;
			gap: 30px;
			max-width: 1200px;
			margin: 40px auto;
			padding: 0 20px;
		}

		.checkout-form {
			background: white;
			padding: 30px;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
		}

		.form-section {
			margin-bottom: 30px;
			padding-bottom: 30px;
			border-bottom: 1px solid var(--border-color);
		}

		.form-section:last-child {
			border-bottom: none;
			margin-bottom: 0;
			padding-bottom: 0;
		}

		.form-section h3 {
			font-size: 18px;
			margin: 0 0 20px 0;
			color: var(--dark-color);
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.form-group {
			margin-bottom: 15px;
		}

		.form-group label {
			display: block;
			margin-bottom: 8px;
			color: var(--dark-color);
			font-weight: 600;
			font-size: 14px;
		}

		.form-group input,
		.form-group select,
		.form-group textarea {
			width: 100%;
			padding: 10px;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			font-size: 14px;
			font-family: inherit;
		}

		.form-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 15px;
		}

		.payment-options {
			display: grid;
			grid-template-columns: 1fr 1fr 1fr;
			gap: 15px;
			margin-bottom: 20px;
		}

		.payment-option {
			border: 2px solid var(--border-color);
			padding: 15px;
			border-radius: 8px;
			cursor: pointer;
			transition: all 0.3s ease;
			text-align: center;
		}

		.payment-option input[type="radio"] {
			display: none;
		}

		.payment-option input[type="radio"]:checked+label {
			color: var(--primary-color);
		}

		.payment-option:has(input[type="radio"]:checked) {
			border-color: var(--primary-color);
			background-color: rgba(8, 129, 120, 0.05);
		}

		.payment-option label {
			cursor: pointer;
			display: block;
			margin: 0;
		}

		.payment-option i {
			font-size: 28px;
			margin-bottom: 8px;
			display: block;
		}

		.address-card {
			border: 2px solid var(--border-color);
			padding: 15px;
			border-radius: 8px;
			margin-bottom: 15px;
			cursor: pointer;
			transition: all 0.3s ease;
		}

		.address-card input[type="radio"] {
			display: none;
		}

		.address-card:has(input[type="radio"]:checked) {
			border-color: var(--primary-color);
			background-color: rgba(8, 129, 120, 0.05);
		}

		.address-card p {
			margin: 0;
			font-size: 13px;
			color: var(--text-color);
			line-height: 1.6;
		}

		.sidebar-summary {
			background: white;
			padding: 20px;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			position: sticky;
			top: 100px;
			height: fit-content;
		}

		.order-item {
			display: flex;
			gap: 10px;
			margin-bottom: 15px;
			padding-bottom: 15px;
			border-bottom: 1px solid var(--border-color);
		}

		.order-item:last-child {
			border-bottom: none;
			margin-bottom: 0;
			padding-bottom: 0;
		}

		.order-item img {
			width: 60px;
			height: 60px;
			object-fit: cover;
			border-radius: 4px;
		}

		.order-item-info {
			flex: 1;
			font-size: 12px;
		}

		.order-item-info p {
			margin: 0;
			color: var(--text-color);
		}

		.order-item-info strong {
			color: var(--dark-color);
		}

		.summary-row {
			display: flex;
			justify-content: space-between;
			margin-bottom: 10px;
			font-size: 14px;
		}

		.summary-row.total {
			border-top: 2px solid var(--primary-color);
			padding-top: 10px;
			margin-top: 15px;
			font-size: 18px;
			font-weight: 700;
			color: var(--primary-color);
		}

		.coupon-input-group {
			display: flex;
			gap: 8px;
			margin-bottom: 15px;
		}

		.coupon-input-group input {
			flex: 1;
		}

		.coupon-input-group button {
			padding: 10px 15px;
			white-space: nowrap;
		}

		.btn-place-order {
			width: 100%;
			margin-top: 20px;
			padding: 12px;
			background-color: var(--primary-color);
			color: white;
			border: none;
			border-radius: 4px;
			font-size: 16px;
			font-weight: 700;
			cursor: pointer;
			transition: 0.3s ease;
		}

		.btn-place-order:hover {
			background-color: #067066;
		}

		.btn-place-order:disabled {
			background-color: var(--border-color);
			cursor: not-allowed;
		}

		@media (max-width: 768px) {
			.checkout-container {
				grid-template-columns: 1fr;
			}

			.sidebar-summary {
				position: relative;
				top: auto;
			}

			.payment-options {
				grid-template-columns: 1fr;
			}

			.form-row {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body>
	<!-- Header -->
	<header id="header">
		<a href="../index.html"><img src="../img/logo.png" class="logo" alt="logo"></a>
		<div class="brand">
			<h2>Emporium</h2>
		</div>
		<h1>Checkout</h1>
		<div class="header-icons">
			<a href="cart.html"><i class="far fa-shopping-bag"></i></a>
			<a href="wishlist.html"><i class="far fa-heart"></i></a>
		</div>
	</header>

	<main>
		<div class="checkout-container">
			<!-- Checkout Form -->
			<div class="checkout-form" id="checkoutForm">
				<!-- Shipping Address -->
				<div class="form-section">
					<h3><i class="fas fa-map-marker-alt"></i> Shipping Address</h3>

					<div id="savedAddresses"></div>

					<div
						style="border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; background-color: var(--light-color); margin-top: 15px;">
						<label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 0;">
							<input type="radio" name="address" id="newAddress" value="new">
							<span>Use Different Address</span>
						</label>
					</div>

					<div id="newAddressForm"
						style="display: none; margin-top: 15px; border: 1px solid var(--border-color); padding: 15px; border-radius: 8px;">
						<div class="form-row">
							<div class="form-group">
								<label>First Name</label>
								<input type="text" id="firstName" placeholder="John">
							</div>
							<div class="form-group">
								<label>Last Name</label>
								<input type="text" id="lastName" placeholder="Doe">
							</div>
						</div>
						<div class="form-group">
							<label>Email</label>
							<input type="email" id="email" placeholder="john@example.com">
						</div>
						<div class="form-group">
							<label>Phone</label>
							<input type="tel" id="phone" placeholder="+1 (555) 000-0000">
						</div>
						<div class="form-group">
							<label>Address</label>
							<input type="text" id="address" placeholder="123 Main Street">
						</div>
						<div class="form-row">
							<div class="form-group">
								<label>City</label>
								<input type="text" id="city" placeholder="New York">
							</div>
							<div class="form-group">
								<label>State/Province</label>
								<input type="text" id="state" placeholder="NY">
							</div>
						</div>
						<div class="form-row">
							<div class="form-group">
								<label>Postal Code</label>
								<input type="text" id="postalCode" placeholder="10001">
							</div>
							<div class="form-group">
								<label>Country</label>
								<input type="text" id="country" placeholder="United States" value="United States">
							</div>
						</div>
					</div>
				</div>

				<!-- Shipping Method -->
				<div class="form-section">
					<h3><i class="fas fa-truck"></i> Shipping Method</h3>

					<div class="form-group">
						<label>
							<input type="radio" name="shipping" value="standard" checked> Standard Shipping (Free)
							<p style="margin: 5px 0 0 24px; font-size: 12px; color: var(--text-color);">Delivery in 5-7
								business days</p>
						</label>
					</div>

					<div class="form-group">
						<label>
							<input type="radio" name="shipping" value="express"> Express Shipping (+$15)
							<p style="margin: 5px 0 0 24px; font-size: 12px; color: var(--text-color);">Delivery in 2-3
								business days</p>
						</label>
					</div>

					<div class="form-group">
						<label>
							<input type="radio" name="shipping" value="overnight"> Overnight Shipping (+$25)
							<p style="margin: 5px 0 0 24px; font-size: 12px; color: var(--text-color);">Delivery by next
								business day</p>
						</label>
					</div>
				</div>

				<!-- Coupon Code -->
				<div class="form-section">
					<h3><i class="fas fa-ticket-alt"></i> Apply Coupon Code</h3>

					<div class="coupon-input-group">
						<input type="text" id="couponCode" placeholder="Enter coupon code">
						<button class="btn btn-secondary" onclick="applyCoupon()">Apply</button>
					</div>

					<div id="couponMessage" style="font-size: 12px; margin-top: 8px;"></div>
				</div>

				<!-- Payment Method -->
				<div class="form-section">
					<h3><i class="fas fa-credit-card"></i> Payment Method</h3>

					<div class="payment-options">
						<div class="payment-option">
							<input type="radio" id="paypal" name="payment" value="paypal" checked>
							<label for="paypal">
								<i class="fab fa-paypal"></i>
								<span>PayPal</span>
							</label>
						</div>

						<div class="payment-option">
							<input type="radio" id="stripe" name="payment" value="stripe">
							<label for="stripe">
								<i class="fab fa-cc-stripe"></i>
								<span>Stripe</span>
							</label>
						</div>

						<div class="payment-option">
							<input type="radio" id="cod" name="payment" value="cod">
							<label for="cod">
								<i class="fas fa-hand-holding-usd"></i>
								<span>Cash on Delivery</span>
							</label>
						</div>
					</div>

					<div id="cardDetails"
						style="display: none; border: 1px solid var(--border-color); padding: 15px; border-radius: 8px;">
						<div class="form-group">
							<label>Card Holder Name</label>
							<input type="text" placeholder="John Doe">
						</div>
						<div class="form-group">
							<label>Card Number</label>
							<input type="text" placeholder="4532 1488 0343 6467" maxlength="19">
						</div>
						<div class="form-row">
							<div class="form-group">
								<label>Expiry Date</label>
								<input type="text" placeholder="MM/YY" maxlength="5">
							</div>
							<div class="form-group">
								<label>CVV</label>
								<input type="text" placeholder="123" maxlength="3">
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- Order Summary Sidebar -->
			<div class="sidebar-summary">
				<h3 style="margin-top: 0;">Order Summary</h3>

				<div id="cartItems"></div>

				<div class="summary-row">
					<span>Subtotal:</span>
					<span id="subtotal">₹0.00</span>
				</div>

				<div class="summary-row">
					<span>Shipping:</span>
					<span id="shippingCost">Free</span>
				</div>

				<div class="summary-row" id="taxRow">
					<span>Tax (10%):</span>
					<span id="tax">₹0.00</span>
				</div>

				<div class="summary-row" id="discountRow" style="display: none; color: var(--success-color);">
					<span>Discount:</span>
					<span id="discount">-₹0.00</span>
				</div>

				<div class="summary-row total">
					<span>Total:</span>
					<span id="totalAmount">₹0.00</span>
				</div>

				<button class="btn-place-order" onclick="placeOrder()">Place Order</button>
				<button class="btn btn-secondary" style="width: 100%; margin-top: 8px;"
					onclick="window.location.href='cart.html'">Back to Cart</button>
			</div>
		</div>
	</main>

	<footer id="footer"></footer>

	<script src="../js/main.js"></script>
	<script>
		let appliedDiscount = 0;

		document.addEventListener('DOMContentLoaded', function () {
			const user = storageManager.getUser();
			if (!user) {
				window.location.href = '../pages/auth/login.html';
				return;
			}

			loadCartItems();
			loadSavedAddresses();
			setupPaymentToggle();
			setupShippingCalculation();
			setupAddressToggle();
		});

		function loadCartItems() {
			const cart = storageManager.getCart();
			const cartItemsContainer = document.getElementById('cartItems');
			let subtotal = 0;

			if (cart.length === 0) {
				cartItemsContainer.innerHTML = '<p style="color: var(--text-color); text-align: center;">Your cart is empty</p>';
				return;
			}

			let html = '';
			cart.forEach(product => {
				const itemTotal = (product.discountPrice || product.price) * product.quantity;
				subtotal += itemTotal;
				html += `
					<div class="order-item">
						<img src="${product.image}" alt="${product.name}">
						<div class="order-item-info">
							<p><strong>${product.name}</strong></p>
							<p>₹${(product.discountPrice || product.price).toFixed(2)} × ${product.quantity}</p>
							<p style="margin-top: 5px;"><strong>₹${itemTotal.toFixed(2)}</strong></p>
						</div>
					</div>
				`;
			});

			cartItemsContainer.innerHTML = html;
			updateSummary(subtotal);
		}

		function loadSavedAddresses() {
			const user = storageManager.getUser();
			const addresses = user.addresses || [];
			const container = document.querySelector('[id="savedAddresses"]');

			let html = '';
			if (addresses.length > 0) {
				addresses.forEach((address, index) => {
					html += `
						<div class="address-card">
							<input type="radio" name="address" id="addr${index}" value="saved${index}" ${index === 0 ? 'checked' : ''}>
							<label for="addr${index}" style="cursor: pointer;">
								<strong>${address.type}</strong><br>
								${address.fullName}<br>
								${address.address}<br>
								${address.city}, ${address.state} ${address.postalCode}<br>
								${address.phone}
							</label>
						</div>
					`;
				});
			}

			container.innerHTML = html;

			// Show/hide new address form based on selection
			document.querySelectorAll('input[name="address"]').forEach(radio => {
				radio.addEventListener('change', function () {
					const newAddressForm = document.getElementById('newAddressForm');
					if (this.value === 'new') {
						newAddressForm.style.display = 'block';
					} else {
						newAddressForm.style.display = 'none';
					}
				});
			});
		}

		function setupPaymentToggle() {
			const paymentRadios = document.querySelectorAll('input[name="payment"]');
			const cardDetails = document.getElementById('cardDetails');

			paymentRadios.forEach(radio => {
				radio.addEventListener('change', function () {
					if (this.value === 'stripe') {
						cardDetails.style.display = 'block';
					} else {
						cardDetails.style.display = 'none';
					}
				});
			});
		}

		function setupShippingCalculation() {
			const shippingRadios = document.querySelectorAll('input[name="shipping"]');
			shippingRadios.forEach(radio => {
				radio.addEventListener('change', updateSummary);
			});
		}

		function setupAddressToggle() {
			const newAddressRadio = document.getElementById('newAddress');
			if (newAddressRadio) {
				newAddressRadio.addEventListener('change', function () {
					document.getElementById('newAddressForm').style.display = this.checked ? 'block' : 'none';
				});
			}
		}

		function updateSummary(subtotal = null) {
			const cart = storageManager.getCart();
			if (subtotal === null) {
				subtotal = 0;
				cart.forEach(product => {
					subtotal += (product.discountPrice || product.price) * product.quantity;
				});
			}

			const shippingMethod = document.querySelector('input[name="shipping"]:checked').value;
			let shippingCost = 0;
			let shippingLabel = 'Free';

			if (shippingMethod === 'express') {
				shippingCost = 15;
				shippingLabel = '₹15.00';
			} else if (shippingMethod === 'overnight') {
				shippingCost = 25;
				shippingLabel = '₹25.00';
			}

			const taxAmount = (subtotal + shippingCost) * 0.1;
			let total = subtotal + shippingCost + taxAmount - appliedDiscount;

			document.getElementById('subtotal').textContent = '₹' + subtotal.toFixed(2);
			document.getElementById('shippingCost').textContent = shippingLabel;
			document.getElementById('tax').textContent = '₹' + taxAmount.toFixed(2);
			document.getElementById('totalAmount').textContent = '₹' + total.toFixed(2);
		}

		function applyCoupon() {
			const couponCode = document.getElementById('couponCode').value.toUpperCase();
			const messageDiv = document.getElementById('couponMessage');

			if (!couponCode) {
				messageDiv.innerHTML = '<span style="color: var(--danger-color);">Please enter a coupon code</span>';
				return;
			}

			// Mock coupon codes
			const coupons = {
				'SAVE10': 0.10,
				'SAVE20': 0.20,
				'SUMMER': 0.15
			};

			if (coupons[couponCode]) {
				const cart = storageManager.getCart();
				let subtotal = 0;
				cart.forEach(product => {
					subtotal += (product.discountPrice || product.price) * product.quantity;
				});

				appliedDiscount = subtotal * coupons[couponCode];
				messageDiv.innerHTML = `<span style="color: var(--success-color);">✓ Coupon applied! You saved ₹${appliedDiscount.toFixed(2)}</span>`;
				document.getElementById('discountRow').style.display = 'flex';
				document.getElementById('discount').textContent = '-₹' + appliedDiscount.toFixed(2);
				updateSummary();
			} else {
				messageDiv.innerHTML = '<span style="color: var(--danger-color);">Invalid coupon code</span>';
				appliedDiscount = 0;
				document.getElementById('discountRow').style.display = 'none';
				updateSummary();
			}
		}

		function placeOrder() {
			const selectedPayment = document.querySelector('input[name="payment"]:checked').value;
			const selectedAddress = document.querySelector('input[name="address"]:checked').value;
			const shippingMethod = document.querySelector('input[name="shipping"]:checked').value;

			if (!selectedAddress || !selectedPayment) {
				showToast('Please select an address and payment method', 'error');
				return;
			}

			// Create order object
			const cart = storageManager.getCart();
			const order = {
				id: '#ORD' + Date.now(),
				items: cart,
				total: document.getElementById('totalAmount').textContent,
				status: 'pending',
				paymentMethod: selectedPayment,
				shippingMethod: shippingMethod,
				date: new Date().toLocaleDateString(),
				address: selectedAddress
			};

			// Save order
			const user = storageManager.getUser();
			if (!user.orders) user.orders = [];
			user.orders.push(order);
			storageManager.setUser(user);

			// Clear cart
			storageManager.setCart([]);

			showToast('Order placed successfully!', 'success');

			// Redirect to order confirmation
			setTimeout(() => {
				window.location.href = 'order-confirmation.html?orderid=' + order.id;
			}, 1500);
		}
	</script>
</body>

</html>
