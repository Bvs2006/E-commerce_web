<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Events - Emporium</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" href="../css/main.css">
	<style>
		.events-container {
			max-width: 1200px;
			margin: 40px auto;
			padding: 0 20px;
		}

		.events-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
			gap: 30px;
			margin-bottom: 40px;
		}

		.event-card {
			background: white;
			border-radius: 8px;
			overflow: hidden;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			transition: all 0.3s ease;
		}

		.event-card:hover {
			box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
			transform: translateY(-5px);
		}

		.event-image {
			width: 100%;
			height: 200px;
			object-fit: cover;
			position: relative;
			overflow: hidden;
		}

		.event-image img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		.event-badge {
			position: absolute;
			top: 15px;
			right: 15px;
			background: var(--danger-color);
			color: white;
			padding: 8px 15px;
			border-radius: 4px;
			font-weight: 700;
			font-size: 12px;
		}

		.event-content {
			padding: 20px;
		}

		.event-title {
			margin: 0 0 8px 0;
			font-size: 18px;
			font-weight: 700;
			color: var(--dark-color);
		}

		.event-seller {
			font-size: 13px;
			color: var(--primary-color);
			font-weight: 600;
			margin-bottom: 12px;
		}

		.event-description {
			font-size: 13px;
			color: var(--text-color);
			margin-bottom: 15px;
			line-height: 1.6;
		}

		.event-dates {
			font-size: 12px;
			color: var(--text-color);
			margin-bottom: 15px;
		}

		.event-dates strong {
			color: var(--dark-color);
		}

		.event-timer {
			background-color: var(--light-color);
			padding: 15px;
			border-radius: 4px;
			margin-bottom: 15px;
			text-align: center;
		}

		.event-timer h5 {
			margin: 0 0 8px 0;
			font-size: 12px;
			color: var(--text-color);
			text-transform: uppercase;
		}

		.countdown {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 8px;
			font-size: 12px;
		}

		.countdown-item {
			background: white;
			padding: 8px;
			border-radius: 4px;
			border: 1px solid var(--border-color);
		}

		.countdown-value {
			font-size: 16px;
			font-weight: 700;
			color: var(--primary-color);
		}

		.countdown-label {
			font-size: 10px;
			color: var(--text-color);
			margin-top: 2px;
		}

		.event-products {
			margin-bottom: 15px;
			font-size: 12px;
		}

		.event-products strong {
			color: var(--dark-color);
		}

		.event-products span {
			color: var(--primary-color);
			font-weight: 700;
		}

		.event-discount {
			background: var(--primary-color);
			color: white;
			padding: 12px;
			border-radius: 4px;
			text-align: center;
			font-weight: 700;
			margin-bottom: 12px;
		}

		.event-actions {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 10px;
		}

		.event-actions a,
		.event-actions button {
			padding: 10px;
			text-align: center;
			border-radius: 4px;
			text-decoration: none;
			font-size: 13px;
			font-weight: 600;
			cursor: pointer;
			border: none;
			transition: 0.3s ease;
		}

		.event-shop-btn {
			background-color: var(--primary-color);
			color: white;
		}

		.event-shop-btn:hover {
			background-color: #067066;
		}

		.event-details-btn {
			background-color: var(--light-color);
			color: var(--dark-color);
			border: 1px solid var(--border-color);
		}

		.event-details-btn:hover {
			background-color: #e8e8e8;
		}

		.filter-tabs {
			display: flex;
			gap: 10px;
			margin-bottom: 30px;
			flex-wrap: wrap;
		}

		.filter-tab {
			padding: 8px 15px;
			border: 2px solid var(--border-color);
			background: white;
			border-radius: 4px;
			cursor: pointer;
			font-size: 13px;
			font-weight: 600;
			transition: all 0.3s ease;
		}

		.filter-tab:hover,
		.filter-tab.active {
			border-color: var(--primary-color);
			background-color: var(--primary-color);
			color: white;
		}

		@media (max-width: 768px) {
			.events-grid {
				grid-template-columns: 1fr;
			}

			.countdown {
				grid-template-columns: repeat(4, 1fr);
			}

			.event-actions {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body>
	<!-- Header -->
	<header id="header">
		<a href="../index.html"><img src="../img/logo.png" class="logo" alt="logo"></a>
		<div class="brand">
			<h2>Emporium</h2>
		</div>
		<h1>Events & Sales</h1>
		<div class="header-icons">
			<a href="cart.html"><i class="far fa-shopping-bag"></i></a>
			<a href="wishlist.html"><i class="far fa-heart"></i></a>
		</div>
	</header>

	<main>
		<div class="events-container">
			<h2 style="margin-bottom: 20px;">Current Events & Flash Sales</h2>

			<div class="filter-tabs">
				<button class="filter-tab active" onclick="filterEvents('all', this)">All Events</button>
				<button class="filter-tab" onclick="filterEvents('active', this)">Active Now</button>
				<button class="filter-tab" onclick="filterEvents('upcoming', this)">Upcoming</button>
				<button class="filter-tab" onclick="filterEvents('ended', this)">Ended</button>
			</div>

			<div class="events-grid" id="eventsGrid"></div>
		</div>
	</main>

	<footer id="footer"></footer>

	<script src="../js/main.js"></script>
	<script>
		const mockEvents = [
			{
				id: 1,
				title: "Summer Sale 2024",
				seller: "Fashion World",
				description: "Get up to 50% off on all summer collection items",
				image: "https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&q=80&w=1200",
				discount: "Up to 50% OFF",
				startDate: new Date(2024, 0, 20),
				endDate: new Date(2024, 0, 31),
				products: 45,
				status: "active"
			},
			{
				id: 2,
				title: "Electronics Mega Deal",
				seller: "Tech Hub",
				description: "Amazing discounts on smartphones, laptops, and accessories",
				image: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&q=80&w=1200",
				discount: "Up to 40% OFF",
				startDate: new Date(2024, 0, 22),
				endDate: new Date(2024, 1, 5),
				products: 120,
				status: "active"
			},
			{
				id: 3,
				title: "Beauty & Cosmetics Festival",
				seller: "Beauty Store",
				description: "Special discounts on premium beauty and skincare products",
				image: "https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&q=80&w=1200",
				discount: "Up to 35% OFF",
				startDate: new Date(2024, 0, 25),
				endDate: new Date(2024, 2, 10),
				products: 80,
				status: "active"
			},
			{
				id: 4,
				title: "Home & Kitchen Extravaganza",
				seller: "Home Goods Co",
				description: "Transform your home with amazing deals on furniture and appliances",
				image: "https://images.unsplash.com/photo-1556911220-e15b29be8c8f?auto=format&fit=crop&q=80&w=1200",
				discount: "Up to 45% OFF",
				startDate: new Date(2024, 1, 1),
				endDate: new Date(2024, 1, 20),
				products: 200,
				status: "upcoming"
			},
			{
				id: 5,
				title: "Sports & Outdoors Flash Sale",
				seller: "Sports Central",
				description: "Limited time deals on sports equipment and outdoor gear",
				image: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&q=80&w=1200",
				discount: "Up to 60% OFF",
				startDate: new Date(2024, 2, 5),
				endDate: new Date(2024, 2, 10),
				products: 95,
				status: "upcoming"
			}
		];

		document.addEventListener('DOMContentLoaded', function () {
			displayEvents('all');
		});

		function displayEvents(filter = 'all') {
			const grid = document.getElementById('eventsGrid');
			let events = mockEvents;

			if (filter !== 'all') {
				events = events.filter(e => e.status === filter);
			}

			if (events.length === 0) {
				grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;"><i class="fas fa-calendar-times" style="font-size: 40px; color: var(--border-color); margin-bottom: 15px;"></i><h3>No events found</h3></div>';
				return;
			}

			let html = '';
			events.forEach(event => {
				const now = new Date();
				const timeLeft = event.endDate - now;
				const daysLeft = Math.ceil(timeLeft / (1000 * 60 * 60 * 24));

				html += `
					<div class="event-card">
						<div class="event-image">
							<img src="${event.image}" alt="${event.title}">
							<div class="event-badge">${event.status === 'ended' ? 'ENDED' : daysLeft + ' days left'}</div>
						</div>
						<div class="event-content">
							<h3 class="event-title">${event.title}</h3>
							<p class="event-seller">by ${event.seller}</p>
							<p class="event-description">${event.description}</p>

							<div class="event-timer">
								<h5>Ends In</h5>
								<div class="countdown">
									<div class="countdown-item">
										<div class="countdown-value">${Math.floor(timeLeft / (1000 * 60 * 60 * 24))}</div>
										<div class="countdown-label">Days</div>
									</div>
									<div class="countdown-item">
										<div class="countdown-value">${Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))}</div>
										<div class="countdown-label">Hours</div>
									</div>
									<div class="countdown-item">
										<div class="countdown-value">${Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60))}</div>
										<div class="countdown-label">Mins</div>
									</div>
									<div class="countdown-item">
										<div class="countdown-value">${Math.floor((timeLeft % (1000 * 60)) / 1000)}</div>
										<div class="countdown-label">Secs</div>
									</div>
								</div>
							</div>

							<div class="event-products">
								<strong><span>${event.products}</span> Products</strong> participating in this event
							</div>

							<div class="event-discount">${event.discount}</div>

							<div class="event-actions">
								<button class="event-shop-btn" onclick="window.location.href='products.html'">
									<i class="fas fa-shopping-bag"></i> Shop Now
								</button>
								<a href="javascript:void(0)" class="event-details-btn">
									<i class="fas fa-info-circle"></i> Details
								</a>
							</div>
						</div>
					</div>
				`;
			});

			grid.innerHTML = html;
		}

		function filterEvents(status, button) {
			document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
			button.classList.add('active');
			displayEvents(status === 'all' ? 'all' : status);
		}
	</script>
</body>

</html>
