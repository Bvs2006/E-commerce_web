<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>User Login - Emporium</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" href="../../css/main.css">
	<style>
		.auth-container {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: linear-gradient(135deg, #088178 0%, #066c5e 100%);
			padding: 20px;
		}

		.auth-box {
			background: white;
			padding: 40px;
			border-radius: 10px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
			width: 100%;
			max-width: 400px;
		}

		.auth-box h2 {
			text-align: center;
			margin-bottom: 10px;
			color: var(--primary-color);
		}

		.auth-box .subtitle {
			text-align: center;
			color: var(--text-color);
			font-size: 13px;
			margin-bottom: 30px;
		}

		.form-group {
			margin-bottom: 20px;
		}

		.form-group label {
			display: block;
			margin-bottom: 8px;
			font-weight: 600;
			color: var(--dark-color);
		}

		.form-group input {
			width: 100%;
			padding: 12px;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			font-size: 14px;
			transition: 0.3s ease;
		}

		.form-group input:focus {
			border-color: var(--primary-color);
			box-shadow: 0 0 0 3px rgba(8, 129, 120, 0.1);
			outline: none;
		}

		.remember-forgot {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 20px;
			font-size: 13px;
		}

		.remember-forgot a {
			color: var(--primary-color);
			text-decoration: none;
			transition: 0.3s ease;
		}

		.remember-forgot a:hover {
			text-decoration: underline;
		}

		.login-btn {
			width: 100%;
			padding: 12px;
			background-color: var(--primary-color);
			color: white;
			border: none;
			border-radius: 4px;
			font-size: 16px;
			font-weight: 700;
			cursor: pointer;
			transition: 0.3s ease;
			margin-bottom: 15px;
		}

		.login-btn:hover {
			background-color: #066c5e;
		}

		.divider {
			text-align: center;
			margin: 20px 0;
			position: relative;
			color: var(--text-color);
			font-size: 13px;
		}

		.divider::before,
		.divider::after {
			content: '';
			position: absolute;
			height: 1px;
			background-color: var(--border-color);
			top: 50%;
			width: 45%;
		}

		.divider::before {
			left: 0;
		}

		.divider::after {
			right: 0;
		}

		.social-login {
			display: flex;
			gap: 10px;
			margin-bottom: 20px;
		}

		.social-btn {
			flex: 1;
			padding: 10px;
			border: 1px solid var(--border-color);
			background: white;
			border-radius: 4px;
			cursor: pointer;
			font-size: 18px;
			transition: 0.3s ease;
		}

		.social-btn:hover {
			border-color: var(--primary-color);
			color: var(--primary-color);
		}

		.signup-link {
			text-align: center;
			color: var(--text-color);
			font-size: 14px;
		}

		.signup-link a {
			color: var(--primary-color);
			text-decoration: none;
			font-weight: 700;
			transition: 0.3s ease;
		}

		.signup-link a:hover {
			text-decoration: underline;
		}

		.role-selector {
			display: flex;
			gap: 10px;
			margin-bottom: 20px;
		}

		.role-btn {
			flex: 1;
			padding: 10px;
			border: 2px solid var(--border-color);
			background: white;
			border-radius: 4px;
			cursor: pointer;
			font-weight: 600;
			transition: 0.3s ease;
			color: var(--text-color);
		}

		.role-btn.active {
			border-color: var(--primary-color);
			background-color: rgba(8, 129, 120, 0.1);
			color: var(--primary-color);
		}
	</style>
</head>

<body>
	<div class="auth-container">
		<div class="auth-box">
			<h2>Welcome Back</h2>
			<p class="subtitle">Login to your account to continue shopping</p>

			<div class="role-selector">
				<button class="role-btn active" onclick="selectRole('user')">User</button>
				<button class="role-btn" onclick="selectRole('admin')">Admin</button>
			</div>

			<form id="loginForm">
				<div class="form-group">
					<label for="email">Email Address</label>
					<input type="email" id="email" name="email" placeholder="Enter your email" required>
				</div>

				<div class="form-group">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" placeholder="Enter your password" required>
				</div>

				<div class="remember-forgot">
					<label>
						<input type="checkbox" name="remember"> Remember me
					</label>
					<a href="#">Forgot password?</a>
				</div>

				<button type="submit" class="login-btn">Login</button>
			</form>

			<div class="divider">OR</div>

			<div class="social-login">
				<button class="social-btn" title="Google"><i class="fab fa-google"></i></button>
				<button class="social-btn" title="Facebook"><i class="fab fa-facebook"></i></button>
				<button class="social-btn" title="Twitter"><i class="fab fa-twitter"></i></button>
			</div>

			<div class="signup-link">
				Don't have an account? <a href="signup.html">Sign up here</a>
			</div>
		</div>
	</div>

	<script src="../../js/main.js"></script>
	<script>
		let selectedRole = 'user';

		function selectRole(role) {
			selectedRole = role;
			document.querySelectorAll('.role-btn').forEach(btn => {
				btn.classList.remove('active');
			});
			event.target.classList.add('active');
		}

		document.getElementById('loginForm').addEventListener('submit', function (e) {
			e.preventDefault();

			const email = document.getElementById('email').value;
			const password = document.getElementById('password').value;

			if (!validateEmail(email)) {
				showToast('Please enter a valid email', 'error');
				return;
			}

			if (!validatePassword(password)) {
				showToast('Password must be at least 6 characters', 'error');
				return;
			}

			// Mock login
			const user = {
				id: Date.now(),
				email: email,
				name: email.split('@')[0],
				role: selectedRole,
				avatar: 'https://via.placeholder.com/150'
			};

			storageManager.setUser(user);
			showToast(`Welcome back, ${user.name}!`, 'success');

			// Redirect based on role
			setTimeout(() => {
				if (selectedRole === 'admin') {
					window.location.href = '../admin/dashboard.html';
				} else {
					window.location.href = '../../index.html';
				}
			}, 1000);
		});
	</script>
</body>

</html>
