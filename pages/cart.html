<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Shopping Cart - Emporium</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" href="../css/main.css">
	<style>
		.cart-container {
			display: grid;
			grid-template-columns: 1fr 350px;
			gap: 30px;
			max-width: 1200px;
			margin: 40px auto;
			padding: 0 20px;
		}

		.cart-items-section {
			background: white;
			padding: 30px;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
		}

		.cart-item {
			display: grid;
			grid-template-columns: 100px 1fr 80px 80px 80px;
			gap: 20px;
			align-items: center;
			padding: 20px;
			border-bottom: 1px solid var(--border-color);
		}

		.cart-item:last-child {
			border-bottom: none;
		}

		.cart-item-image {
			width: 100px;
			height: 100px;
			object-fit: cover;
			border-radius: 8px;
		}

		.cart-item-details h4 {
			margin: 0 0 8px 0;
			font-size: 15px;
			color: var(--dark-color);
		}

		.cart-item-details p {
			margin: 0;
			font-size: 13px;
			color: var(--text-color);
		}

		.cart-item-details .seller {
			color: var(--primary-color);
			font-weight: 600;
		}

		.quantity-control {
			display: flex;
			align-items: center;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			width: fit-content;
		}

		.quantity-control button {
			background: none;
			border: none;
			padding: 5px 8px;
			cursor: pointer;
			color: var(--dark-color);
			font-size: 12px;
		}

		.quantity-control input {
			width: 30px;
			text-align: center;
			border: none;
			padding: 5px 0;
			font-size: 13px;
		}

		.item-price {
			text-align: right;
			font-weight: 700;
			color: var(--primary-color);
		}

		.item-total {
			text-align: right;
			font-weight: 700;
			color: var(--dark-color);
			font-size: 15px;
		}

		.remove-btn {
			background: none;
			border: none;
			color: var(--danger-color);
			cursor: pointer;
			font-size: 18px;
		}

		.empty-cart {
			text-align: center;
			padding: 60px 20px;
			color: var(--text-color);
		}

		.empty-cart i {
			font-size: 60px;
			color: var(--border-color);
			margin-bottom: 20px;
		}

		.empty-cart h3 {
			margin: 0 0 10px 0;
			color: var(--dark-color);
		}

		.cart-summary {
			background: white;
			padding: 25px;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			position: sticky;
			top: 100px;
			height: fit-content;
		}

		.summary-row {
			display: flex;
			justify-content: space-between;
			margin-bottom: 12px;
			font-size: 14px;
		}

		.summary-row.total {
			border-top: 2px solid var(--primary-color);
			padding-top: 12px;
			margin-top: 15px;
			font-size: 18px;
			font-weight: 700;
			color: var(--primary-color);
		}

		.coupon-section {
			margin-bottom: 20px;
			padding-bottom: 20px;
			border-bottom: 1px solid var(--border-color);
		}

		.coupon-input {
			display: flex;
			gap: 8px;
			margin-bottom: 8px;
		}

		.coupon-input input {
			flex: 1;
			padding: 8px;
			border: 1px solid var(--border-color);
			border-radius: 4px;
			font-size: 12px;
		}

		.coupon-input button {
			padding: 8px 12px;
			font-size: 12px;
		}

		.coupon-message {
			font-size: 12px;
			margin-bottom: 10px;
		}

		.checkout-btn {
			width: 100%;
			padding: 12px;
			background-color: var(--primary-color);
			color: white;
			border: none;
			border-radius: 4px;
			font-weight: 700;
			cursor: pointer;
			margin-bottom: 10px;
			transition: 0.3s ease;
		}

		.checkout-btn:hover {
			background-color: #067066;
		}

		.continue-shopping-btn {
			width: 100%;
			padding: 12px;
			background-color: var(--light-color);
			color: var(--dark-color);
			border: 1px solid var(--border-color);
			border-radius: 4px;
			font-weight: 600;
			cursor: pointer;
			transition: 0.3s ease;
		}

		.continue-shopping-btn:hover {
			background-color: #e8e8e8;
		}

		@media (max-width: 768px) {
			.cart-container {
				grid-template-columns: 1fr;
			}

			.cart-item {
				grid-template-columns: 80px 1fr;
				gap: 15px;
			}

			.cart-item-image {
				width: 80px;
				height: 80px;
			}

			.quantity-control,
			.item-price,
			.item-total,
			.remove-btn {
				display: none;
			}

			.cart-item-details {
				grid-column: 2;
			}

			.cart-summary {
				position: relative;
				top: auto;
			}

			.coupon-input {
				flex-direction: column;
			}
		}
	</style>
</head>

<body>
	<!-- Header -->
	<header id="header">
		<a href="../index.html"><img src="../img/logo.png" class="logo" alt="logo"></a>
		<div class="brand">
			<h2>Emporium</h2>
		</div>
		<h1>Shopping Cart</h1>
		<a href="cart.html" class="active"><i class="fas fa-shopping-bag"></i><span class="badge"
				id="cartBadge">0</span></a>
		<a href="wishlist.html"><i class="far fa-heart"></i><span class="badge" id="wishlistBadge">0</span></a>
		<div class="user-menu">
			<button onclick="toggleUserMenu()" title="Account">
				<i class="fas fa-user-circle"></i>
			</button>
			<div class="user-dropdown" id="userDropdown">
				<a href="user-profile.html"><i class="fas fa-user"></i> Profile</a>
				<a href="orders.html"><i class="fas fa-box"></i> Orders</a>
				<a href="messages.html"><i class="fas fa-envelope"></i> Messages</a>
				<div id="sellerLinkContainer"></div>
				<hr>
				<a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
			</div>
		</div>
		</div>
	</header>

	<main>
		<div class="cart-container">
			<!-- Cart Items -->
			<div class="cart-items-section">
				<h2 style="margin-top: 0;">Shopping Cart <span id="cartCount">(0 items)</span></h2>
				<div id="cartItemsContainer"></div>
			</div>

			<!-- Cart Summary -->
			<div class="cart-summary">
				<h3 style="margin-top: 0;">Cart Summary</h3>

				<div class="coupon-section">
					<div class="coupon-input">
						<input type="text" id="couponCode" placeholder="Coupon code">
						<button class="btn btn-secondary" onclick="applyCoupon()">Apply</button>
					</div>
					<div id="couponMessage" class="coupon-message"></div>
				</div>

				<div class="summary-row">
					<span>Subtotal:</span>
					<span id="subtotal">$0.00</span>
				</div>

				<div class="summary-row" id="discountRow" style="display: none; color: var(--success-color);">
					<span>Discount:</span>
					<span id="discount">-$0.00</span>
				</div>

				<div class="summary-row">
					<span>Tax (10%):</span>
					<span id="tax">$0.00</span>
				</div>

				<div class="summary-row total">
					<span>Total:</span>
					<span id="total">$0.00</span>
				</div>

				<button class="checkout-btn" onclick="proceedToCheckout()">Proceed to Checkout</button>
				<button class="continue-shopping-btn" onclick="window.location.href='../index.html'">Continue
					Shopping</button>
			</div>
		</div>
	</main>

	<footer id="footer"></footer>

	<script src="../js/main.js"></script>
	<script>
		let appliedDiscount = 0;

		document.addEventListener('DOMContentLoaded', function () {
			loadCartItems();
		});

		function loadCartItems() {
			const cart = storageManager.getCart();
			const container = document.getElementById('cartItemsContainer');

			if (cart.length === 0) {
				container.innerHTML = `
					<div class="empty-cart">
						<i class="fas fa-shopping-bag"></i>
						<h3>Your cart is empty</h3>
						<p>Add some products and come back!</p>
						<a href="../index.html" class="btn btn-primary" style="display: inline-block; margin-top: 15px;">Start Shopping</a>
					</div>
				`;
				document.getElementById('cartCount').textContent = '(0 items)';
				updateSummary();
				return;
			}

			let html = '';
			let totalItems = 0;

			cart.forEach((product, index) => {
				const price = product.discountPrice || product.price;
				const itemTotal = price * product.quantity;
				totalItems += product.quantity;

				html += `
					<div class="cart-item">
						<img src="${product.image}" alt="${product.name}" class="cart-item-image">
						<div class="cart-item-details">
							<h4>${product.name}</h4>
							<p class="seller">By ${product.seller || 'Verified Seller'}</p>
							<p>Price: ₹${price.toFixed(2)}</p>
						</div>
						<div class="quantity-control">
							<button onclick="updateQuantity(${index}, -1)">-</button>
							<input type="number" value="${product.quantity}" min="1" max="100" onchange="updateQuantity(${index}, this.value - ${product.quantity})">
							<button onclick="updateQuantity(${index}, 1)">+</button>
						</div>
						<div class="item-price">₹${price.toFixed(2)}</div>
						<div class="item-total">₹${itemTotal.toFixed(2)}</div>
						<button class="remove-btn" onclick="removeFromCart(${index})" title="Remove"><i class="fas fa-trash"></i></button>
					</div>
				`;
			});

			container.innerHTML = html;
			document.getElementById('cartCount').textContent = `(${totalItems} items)`;
			updateSummary();
		}

		function updateQuantity(index, change) {
			const cart = storageManager.getCart();
			const newQuantity = Math.max(1, cart[index].quantity + parseInt(change));
			cart[index].quantity = newQuantity;
			storageManager.setCart(cart);
			updateCartBadge();
			loadCartItems();
		}

		function removeFromCart(index) {
			const cart = storageManager.getCart();
			const product = cart[index];
			cart.splice(index, 1);
			storageManager.setCart(cart);
			updateCartBadge();
			showToast(`${product.name} removed from cart`, 'info');
			loadCartItems();
		}

		function updateSummary() {
			const cart = storageManager.getCart();
			let subtotal = 0;

			cart.forEach(product => {
				subtotal += (product.discountPrice || product.price) * product.quantity;
			});

			const tax = subtotal * 0.1;
			const total = subtotal + tax - appliedDiscount;

			document.getElementById('subtotal').textContent = '₹' + subtotal.toFixed(2);
			document.getElementById('tax').textContent = '₹' + tax.toFixed(2);
			document.getElementById('total').textContent = '₹' + total.toFixed(2);
		}

		function applyCoupon() {
			const couponCode = document.getElementById('couponCode').value.toUpperCase();
			const messageDiv = document.getElementById('couponMessage');

			if (!couponCode) {
				messageDiv.innerHTML = '<span style="color: var(--danger-color);">Please enter a coupon code</span>';
				return;
			}

			const coupons = {
				'SAVE10': 0.10,
				'SAVE20': 0.20,
				'SUMMER': 0.15
			};

			if (coupons[couponCode]) {
				const cart = storageManager.getCart();
				let subtotal = 0;
				cart.forEach(product => {
					subtotal += (product.discountPrice || product.price) * product.quantity;
				});

				appliedDiscount = subtotal * coupons[couponCode];
				messageDiv.innerHTML = `<span style="color: var(--success-color);">✓ Coupon applied! You saved ₹${appliedDiscount.toFixed(2)}</span>`;
				document.getElementById('discountRow').style.display = 'flex';
				document.getElementById('discount').textContent = '-₹' + appliedDiscount.toFixed(2);
				updateSummary();
				showToast(`Coupon ${couponCode} applied!`, 'success');
			} else {
				messageDiv.innerHTML = '<span style="color: var(--danger-color);">Invalid coupon code</span>';
				appliedDiscount = 0;
				document.getElementById('discountRow').style.display = 'none';
				updateSummary();
			}
		}

		function proceedToCheckout() {
			const cart = storageManager.getCart();
			if (cart.length === 0) {
				showToast('Your cart is empty', 'error');
				return;
			}
			window.location.href = 'checkout.html';
		}
	</script>
</body>

</html>
